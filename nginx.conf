# UNIFIED NGINX CONFIGURATION (TIBA + SAVANNAH + FORMIQ + KOFIA)
# Location: /etc/nginx/sites-available/default

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 25M;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstreams for TIBA (Pointing to host ports mapped to containers)
    upstream tiba_frontend {
        server 127.0.0.1:3000;
    }
    upstream tiba_backend {
        server 127.0.0.1:8080;
    }

    ######################################################
    # TIBA APP (tiba.co.ke)
    ######################################################
    server {
        listen 80;
        server_name tiba.co.ke www.tiba.co.ke;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name tiba.co.ke www.tiba.co.ke;

        ssl_certificate /etc/letsencrypt/live/tiba.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tiba.co.ke/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Global CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        
        # Frontend
        location / {
            proxy_pass http://tiba_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # API routes
        location ~ ^/(api/|users/|patients/|lab/|inventory/|announcement/|company/|customuser/|reports/|pharmacy/|billing/|authperms/) {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://tiba_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            client_max_body_size 25M;
            proxy_read_timeout 120s;
        }

        # Static & Media
        location /static/ { proxy_pass http://tiba_backend; expires 30d; }
        location /media/ { proxy_pass http://tiba_backend; expires 30d; }
    }

    ######################################################
    # SAVANNAH APP (savannah.co.ke)
    ######################################################
    server {
        listen 80;
        server_name savannah.co.ke www.savannah.co.ke;

        location / {
            proxy_pass http://127.0.0.1:8011;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://127.0.0.1:8010/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    ######################################################
    # FORMIQ APP (20.250.163.236)
    ######################################################
    server {
        listen 80;
        server_name 20.250.163.236;

        location / {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
