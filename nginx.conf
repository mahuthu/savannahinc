server {
    listen 80;
    server_name savannahinc.co.ke www.savannahinc.co.ke;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name savannahinc.co.ke www.savannahinc.co.ke;
    
    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/savannahinc.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/savannahinc.co.ke/privkey.pem;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/ssl/certs/dhparam.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer";
    
    # Proxy to Savannah Stack (Frontend container on Port 8011)
    # The frontend container internally proxies to the backend
    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
######################################################
# KOFIA APP (Dockerized)
######################################################

server {
    listen 80;
    server_name kofia.co.ke www.kofia.co.ke;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name kofia.co.ke www.kofia.co.ke;

    ssl_certificate /etc/letsencrypt/live/kofia.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kofia.co.ke/privkey.pem;

    # Proxy to Docker container on port 8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# Admin Subdomain
server {
    listen 80;
    server_name admin.kofia.co.ke;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.kofia.co.ke;

    ssl_certificate /etc/letsencrypt/live/kofia.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kofia.co.ke/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

