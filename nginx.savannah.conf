# Savannah Inc - Nginx Configuration
# This file handles the domain routing for savannah.co.ke

server {
    listen 80;
    server_name savannah.co.ke www.savannah.co.ke;

    # Proxy to Savannah Docker Stack (Frontend on Port 8011)
    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to Savannah Backend directly for Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8010/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# NOTE: The SSL (443) block will be added automatically by Certbot 
# once you run: sudo certbot --nginx -d savannah.co.ke -d www.savannah.co.ke
