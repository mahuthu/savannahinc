# Savannah Inc - Nginx Configuration
# Place this in /etc/nginx/sites-available/savannah

server {
    listen 80;
    server_name savannah.co.ke www.savannah.co.ke;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name savannah.co.ke www.savannah.co.ke;

    # SSL Certificates (Certbot will update these paths)
    ssl_certificate /etc/letsencrypt/live/savannah.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/savannah.co.ke/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";

    # Proxy to Savannah Docker Stack (Frontend on Port 8011)
    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to Savannah Backend directly for Admin/API if needed 
    # (Though 8011 handles it internally)
    location /admin/ {
        proxy_pass http://127.0.0.1:8010/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
